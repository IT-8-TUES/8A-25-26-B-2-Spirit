<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Add Expense</title>
    <script src="add_expense-page.js" defer></script>
</head>
<body>
  <a href="group.html">← Back to Group</a>
  <section>
    <form>
      <label>
        Name
        <input type="text" name="expense" id="expense" required>
      </label>
      <label>
        Amount
        <input type="number" name="amount" id="amount" min="0.01" step="0.01" required>
      </label>
      <label>
        Paid By
        <select id="paid_by" name="paid_by" required></select>
      </label>
      <button type="submit" id="submit">Add</button>
    </form>
    <p id="success-msg"></p>
  </section>
</body>
</html>
