<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Add Expense</title>
    <link rel="stylesheet" href="group_and_expense.css">
    <script src="add_expense-page.js" defer></script>
</head>
<body>
    <div class="container section">
        <a href="group.html" class="text-accent">← Back to group</a>

        <h1 class="heading-lg">Add expense</h1>

        <form class="card" id="expense-form">
            <div class="form-group">
                <label class="label" for="expense">Name</label>
                <input class="input" type="text" name="expense" id="expense" required>
            </div>

            <div class="form-group">
                <label class="label" for="amount">Amount</label>
                <input class="input" type="number" name="amount" id="amount" min="0.01" step="0.01" required>
            </div>

            <div class="form-group">
                <label class="label" for="paid_by">Paid by</label>
                <select class="select" id="paid_by" name="paid_by" required></select>
            </div>

            <button class="btn btn-primary btn-full" type="submit" id="submit">Add</button>
        </form>

        <p id="success-msg" class="alert alert-success hidden"></p>
    </div>
</body>
</html>
